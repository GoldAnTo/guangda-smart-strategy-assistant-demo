server:
  port: ${PORT:3002}

spring:
  application:
    name: guangda-strategy-demo-java
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

ai:
  api-url: ${MODEL_API_URL:http://localhost:11434/v1/chat/completions}
